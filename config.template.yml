# Training config template — values are overridden by train.sh from environment variables.
# See openwakeword/examples/custom_model.yml for full documentation of each field.

model_name: "PLACEHOLDER"

target_phrase:
  - "PLACEHOLDER"

custom_negative_phrases: []

n_samples: 10000
n_samples_val: 2000

tts_batch_size: 50
augmentation_batch_size: 16

piper_sample_generator_path: "/app/piper-sample-generator"
output_dir: "/data/training_output"

rir_paths:
  - "/data/mit_rirs"

background_paths:
  - "/data/audioset_16k"
  - "/data/fma"

background_paths_duplication_rate:
  - 1
  - 1

false_positive_validation_data_path: "/data/validation_set_features.npy"

augmentation_rounds: 1

feature_data_files:
  "ACAV100M_sample": "/data/openwakeword_features_ACAV100M_2000_hrs_16bit.npy"

batch_n_per_class:
  "ACAV100M_sample": 1024
  "adversarial_negative": 50
  "positive": 50

model_type: "dnn"
layer_size: 32

steps: 50000
max_negative_weight: 1500
target_false_positives_per_hour: 0.2
